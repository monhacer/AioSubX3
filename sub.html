<!doctype html>
<html lang="fa" dir="rtl" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>{{ .subTitle }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Vazirmatn:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --font: "Roboto", "Vazirmatn", system-ui, sans-serif;
        --app-bg: transparent;
        
        --bg-glow-1: rgba(168, 85, 247, 0.15);
        --bg-glow-2: rgba(59, 130, 246, 0.18);
        --bg-base: #04060d;
        --bg-mid: #0c1224;
        --bg-end: #060914;

        --surface: rgba(20, 30, 55, 0.4);
        --surface-hover: rgba(35, 45, 75, 0.5);
        --border: rgba(255, 255, 255, 0.08);
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        
        --color-usage: #3b82f6;        
        --color-chart: #a855f7;        
        --color-time: #f59e0b;        
        --color-apps: #10b981;        
        
        --primary: var(--color-usage);
        --primary-glow: rgba(59, 130, 246, 0.2);
        --nav-active: #3b82f6;
        --nav-inactive: #64748b;
        
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;

        --radius-lg: 1.5rem;
        --radius-md: 1.15rem;
        --radius-sm: 0.7rem;
      }

      html[data-theme="light"] {
        color-scheme: light;
        
        --bg-glow-1: rgba(168, 85, 247, 0.12);
        --bg-glow-2: rgba(59, 130, 246, 0.12);
        --bg-base: #f8fafc;
        --bg-mid: #e2e8f0;
        --bg-end: #f1f5f9;

        --surface: rgba(255, 255, 255, 0.45);
        --surface-hover: rgba(255, 255, 255, 0.7);
        --border: rgba(15, 23, 42, 0.08);
        --text-primary: #0f172a;
        --text-secondary: #64748b;
        
        --color-usage: #1d4ed8;
        --color-chart: #7e22ce;
        --color-time: #b45309;
        --color-apps: #047857;
        
        --primary: var(--color-usage);
        --primary-glow: rgba(29, 78, 216, 0.1);
        --nav-active: #1d4ed8;
        --nav-inactive: #94a3b8;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      
      body {
        font-family: var(--font);
        background: 
          radial-gradient(circle at 15% 25%, var(--bg-glow-1) 0%, transparent 40%),
          radial-gradient(circle at 85% 75%, var(--bg-glow-2) 0%, transparent 45%),
          linear-gradient(135deg, var(--bg-base) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
        background-size: 200% 200%;
        animation: auroraBG 18s ease infinite alternate;
        color: var(--text-primary);
        display: flex;
        justify-content: center;
        min-height: 100vh;
        transition: color 0.3s ease;
      }

      @keyframes auroraBG {
        0% { background-position: 0% 0%; }
        50% { background-position: 100% 100%; }
        100% { background-position: 0% 100%; }
      }

      .app-container {
        width: 100%;
        max-width: 450px;
        min-height: 100vh;
        background: var(--app-bg);
        position: relative;
        display: flex;
        flex-direction: column;
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.25rem;
        background: transparent;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 40;
      }
      .header-info { display: flex; flex-direction: column; }
      .header-title { font-size: 1.05rem; font-weight: 800; color: var(--text-primary); }
      .header-email { font-size: 0.75rem; color: var(--text-secondary); display: none; margin-top: 0.2rem; }
      .header-actions { display: flex; gap: 0.5rem; }
      .icon-btn {
        width: 2.3rem; height: 2.3rem;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: var(--surface);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        color: var(--text-primary);
        display: grid; place-items: center;
        cursor: pointer; transition: 0.2s;
        text-decoration: none;
      }
      .icon-btn:active { transform: scale(0.95); }

      /* Content Area */
      .content-area {
        padding: 1.25rem;
        padding-bottom: 7.5rem;
      }
      .tab-content { display: none; animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
      .tab-content.active { display: block; }
      @keyframes fadeIn { from { opacity: 0; transform: scale(0.98) translateY(4px); } to { opacity: 1; transform: scale(1) translateY(0); } }

      /* Cards */
      .card {
        background: var(--surface);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.25rem;
        margin-bottom: 1rem;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.12);
        position: relative;
        transition: background 0.3s ease, border-color 0.3s ease;
      }

      /* نوارهای شاخص کنار کارت‌ها */
      .usage-wrapper::before,
      .chart-container::before,
      .expiry-card::before,
      .import-card::before {
        content: ''; 
        position: absolute; 
        top: 50%; 
        right: 0; 
        transform: translateY(-50%);
        width: 4px; 
        height: 32px; 
        border-radius: 4px 0 0 4px;
        transition: background 0.3s ease;
      }

      .usage-wrapper::before { background: var(--color-usage); }
      .chart-container::before { background: var(--color-chart); }
      .expiry-card::before { background: var(--color-time); }
      .import-card::before { background: var(--color-apps); }

      html[dir="ltr"] .usage-wrapper::before,
      html[dir="ltr"] .chart-container::before,
      html[dir="ltr"] .expiry-card::before,
      html[dir="ltr"] .import-card::before {
        right: auto;
        left: 0;
        border-radius: 0 4px 4px 0;
      }

      .usage-wrapper { display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 1.25rem; gap: 1.25rem; }
      .ring-side { display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
      .ring-container { position: relative; width: 120px; height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      .progress-ring__circle {
        transition: stroke-dashoffset 0.8s ease-in-out;
        transform: rotate(-90deg);
        transform-origin: 50% 50%;
        stroke-linecap: round;
      }
      .ring-text {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
      }
      .ring-percent { font-size: 1.7rem; font-weight: 900; direction: ltr; }
      .ring-label { font-size: 0.7rem; font-weight: 500; color: var(--text-secondary); }
      
      .status-badge {
        display: inline-flex; align-items: center; gap: 0.35rem;
        padding: 0.3rem 0.75rem; border-radius: 2rem;
        font-size: 0.75rem; font-weight: 700; margin-top: 0.5rem;
        background: rgba(16, 185, 129, 0.12); color: var(--success);
        border: 1px solid rgba(16, 185, 129, 0.15);
      }
      .status-badge.inactive { background: rgba(239, 68, 68, 0.12); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.15); }

      /* لیست اطلاعات ترافیک */
      .stats-side-list { display: flex; flex-direction: column; gap: 0.5rem; flex: 1; width: 100%; }
      .stat-side-row {
        display: flex; justify-content: space-between; align-items: center;
        padding-bottom: 0.4rem; border-bottom: 1px solid rgba(255,255,255,0.03);
      }
      .stat-side-row:last-child { border-bottom: none; padding-bottom: 0; }
      .stat-side-label { font-size: 0.75rem; color: var(--text-secondary); display: flex; align-items: center; gap: 0.35rem; }
      .stat-side-label i { color: var(--color-usage); font-size: 0.8rem; width: 14px; text-align: center; }
      .stat-side-val-group { font-size: 0.9rem; font-weight: 800; display: flex; align-items: center; gap: 0.15rem; }
      html[dir="rtl"] .stat-side-val-group { flex-direction: row; }
      html[dir="ltr"] .stat-side-val-group { flex-direction: row-reverse; }
      .stat-side-unit { font-size: 0.75rem; color: var(--text-secondary); font-weight: 500; }

      /* Sparkline Chart */
      .chart-container {
        padding: 1.25rem;
        margin-bottom: 1rem;
        position: relative;
      }
      .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.75rem;
      }
      .chart-title {
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .chart-title i { color: var(--color-chart); }
      .sparkline-svg {
        width: 100%;
        height: 70px;
        overflow: visible;
      }
      .chart-interactive-group circle {
        cursor: pointer;
        transition: r 0.15s ease, fill 0.15s ease;
      }
      
      .chart-tooltip {
        position: absolute;
        background: rgba(15, 20, 35, 0.95);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 0.5rem;
        padding: 0.4rem 0.6rem;
        pointer-events: none;
        font-size: 0.65rem;
        color: #fff;
        display: none;
        flex-direction: column;
        gap: 0.1rem;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        z-index: 10;
        transform: translate(-50%, -115%);
      }
      .chart-tooltip::after {
        content: '';
        position: absolute;
        bottom: -4px;
        left: 50%;
        transform: translateX(-50%);
        border-width: 4px 4px 0;
        border-style: solid;
        border-color: rgba(15, 20, 35, 0.95) transparent;
        display: block;
        width: 0;
      }

      /* Action Buttons */
      .main-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
      .btn-primary {
        background: rgba(59, 130, 246, 0.85); color: white;
        border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius-md);
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        padding: 0.85rem; font-family: var(--font); font-weight: 700; font-size: 0.85rem;
        display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        box-shadow: 0 4px 15px var(--primary-glow); cursor: pointer;
        transition: 0.2s;
      }
      .btn-primary:active { transform: scale(0.97); }
      .btn-secondary {
        background: var(--surface); color: var(--text-primary);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--border); border-radius: var(--radius-md);
        padding: 0.85rem; font-family: var(--font); font-weight: 700; font-size: 0.85rem;
        display: flex; align-items: center; justify-content: center; gap: 0.5rem; cursor: pointer;
        text-decoration: none;
        transition: 0.2s;
      }
      .btn-secondary:active { transform: scale(0.97); }

      /* Configs & Apps Lists */
      .list-item {
        background: var(--surface); 
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--border); 
        border-radius: var(--radius-md);
        padding: 0.9rem; margin-bottom: 0.75rem;
        display: flex; align-items: center; justify-content: space-between;
      }
      .list-item-title { font-size: 0.85rem; font-weight: 700; word-break: break-all; margin-inline-end: 1rem; direction: ltr; text-align: left; }
      .list-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
      .mini-btn {
        width: 2.1rem; height: 2.1rem; border-radius: var(--radius-sm); border: none;
        background: var(--border); color: var(--text-primary); cursor: pointer;
        transition: 0.2s;
      }
      .mini-btn:hover { background: var(--primary); color: white; }
      
      .app-group { margin-bottom: 1.25rem; }
      .app-group-title { font-size: 0.85rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.5rem; }
      .app-link {
        display: flex; align-items: center; justify-content: space-between;
        background: var(--surface); border: 1px solid var(--border); padding: 0.85rem 1rem;
        border-radius: var(--radius-sm); color: var(--text-primary); text-decoration: none; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 700;
      }

      /* Floating Bottom Navigation */
      .bottom-nav {
        position: fixed;
        bottom: 1.25rem;
        left: 50%;
        transform: translateX(-50%);
        width: calc(100% - 2.5rem);
        max-width: 400px;
        background: rgba(15, 23, 42, 0.35);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border: 1px solid var(--border);
        border-radius: 1.85rem;
        display: flex; 
        justify-content: space-around; 
        padding: 0.5rem 0.8rem;
        z-index: 50;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }
      html[data-theme="light"] .bottom-nav { 
        background: rgba(255, 255, 255, 0.55); 
        border-color: rgba(15, 23, 42, 0.05);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      }
      
      .nav-item {
        display: flex; flex-direction: column; align-items: center; gap: 0.35rem;
        color: var(--nav-inactive); background: none; border: none;
        font-family: var(--font); cursor: pointer; flex: 1; padding: 0.35rem; transition: 0.2s;
      }
      .nav-item i { font-size: 1.2rem; }
      .nav-item span { font-size: 0.65rem; font-weight: 700; }
      .nav-item.active { color: var(--nav-active); transform: translateY(-1px); }

      /* Modals */
      .modal {
        position: fixed; inset: 0; z-index: 100; display: none;
        align-items: center; justify-content: center; background: rgba(0,0,0,0.75);
        backdrop-filter: blur(8px); padding: 1rem;
      }
      .modal.show { display: flex; }
      .modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; width: 100%; max-width: 310px; text-align: center; }
      
      .qr-wrapper {
        position: relative; width: 100%; min-height: 260px;
        background: rgba(255,255,255,0.03); border-radius: var(--radius-sm);
        margin: 1rem 0; display: flex; align-items: center; justify-content: center;
      }
      .qr-img {
        width: 100%; border-radius: var(--radius-sm); background: #fff; padding: 0.75rem;
        opacity: 0; transition: opacity 0.4s ease; display: none;
      }
      .qr-img.loaded { display: block; opacity: 1; }
      
      .qr-loader {
        width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
        border-radius: 50%; border-top-color: var(--color-chart);
        animation: spin 0.8s cubic-bezier(0.6, 0.2, 0.2, 0.8) infinite;
        position: absolute;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      
      .toast {
        position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
        opacity: 0; padding: 0.65rem 1.25rem; border-radius: 2rem; color: #fff;
        background: rgba(59, 130, 246, 0.9);
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        font-size: 0.85rem; font-weight: 700; transition: 0.3s; z-index: 200; pointer-events: none;
      }
      .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
  </head>
  <body>
    <div class="app-container">
      
      <!-- Header -->
      <header class="header">
        <div class="header-info">
          <span class="header-title" id="panelTitle">پنل اشتراک</span>
          <span class="header-email" id="userEmailText"></span>
        </div>
        <div class="header-actions">
          <button id="themeToggleBtn" class="icon-btn"><i id="themeIcon" class="fa-solid fa-moon"></i></button>
          <button id="langToggleBtn" class="icon-btn"><i class="fa-solid fa-globe"></i></button>
          <a id="supportBtn" class="icon-btn" target="_blank" style="display: none;"><i class="fa-brands fa-telegram"></i></a>
        </div>
      </header>

      <!-- Content -->
      <main class="content-area">
        
        <div id="tab-home" class="tab-content active">
          
          <div class="card usage-wrapper">
            <div class="ring-side">
              <div class="ring-container">
                <svg viewBox="0 0 100 100" width="110" height="110">
                  <circle cx="50" cy="50" r="44" fill="none" stroke="var(--border)" stroke-width="7"></circle>
                  <circle id="usageRing" class="progress-ring__circle" cx="50" cy="50" r="44" fill="none" stroke="var(--color-usage)" stroke-width="7" stroke-dasharray="276" stroke-dashoffset="276"></circle>
                </svg>
                <div class="ring-text">
                  <span class="ring-percent" id="ringPercentText">0%</span>
                  <span class="ring-label" id="ringUsageLabel">مصرف شده</span>
                </div>
              </div>
              <div id="statusChip" class="status-badge">
                <i id="statusIcon" class="fa-solid fa-circle-check"></i>
                <span id="statusText">فعال</span>
              </div>
            </div>

            <!-- لیست آمار ترافیک -->
            <div class="stats-side-list">
              <div class="stat-side-row">
                <span class="stat-side-label"><i class="fa-solid fa-database"></i> <span id="totalStatLabel">حجم کل</span></span>
                <div class="stat-side-val-group"><span id="totalStatValue">0</span><span class="stat-side-unit" id="totalUnit">گیگابایت</span></div>
              </div>
              <div class="stat-side-row">
                <span class="stat-side-label"><i class="fa-solid fa-arrow-down"></i> <span id="downloadLabel">دانلود شده</span></span>
                <div class="stat-side-val-group"><span id="downloadVal">0</span><span class="stat-side-unit" id="downloadUnit">گیگابایت</span></div>
              </div>
              <div class="stat-side-row">
                <span class="stat-side-label"><i class="fa-solid fa-arrow-up"></i> <span id="uploadLabel">آپلود شده</span></span>
                <div class="stat-side-val-group"><span id="uploadVal">0</span><span class="stat-side-unit" id="uploadUnit">گیگابایت</span></div>
              </div>
              <div class="stat-side-row">
                <span class="stat-side-label"><i class="fa-solid fa-chart-line"></i> <span id="usedStatLabel">مصرف شده</span></span>
                <div class="stat-side-val-group"><span id="usedStatValue">0</span><span class="stat-side-unit" id="usedUnit">گیگابایت</span></div>
              </div>
              <div class="stat-side-row">
                <span class="stat-side-label"><i class="fa-solid fa-pie-chart"></i> <span id="remainedStatLabel">باقی مانده</span></span>
                <div class="stat-side-val-group"><span id="remainedStatValue">0</span><span class="stat-side-unit" id="remainedUnit">گیگابایت</span></div>
              </div>
            </div>
          </div>

          <div class="card import-card" style="display: flex; flex-direction: column; gap: 0.75rem;">
            <div style="font-size: 0.8rem; font-weight: 800; display: flex; align-items: center; gap: 0.4rem;">
              <i class="fa-solid fa-bolt" style="color: var(--color-apps);"></i>
              <span id="quickImportLabel">افزودن سریع به برنامه‌ها</span>
            </div>
            <div style="display: flex; gap: 0.5rem;">
              <a id="btnImportHapp" href="#" class="btn-secondary" style="flex: 1;"><i class="fa-solid fa-bolt-lightning" style="color: var(--color-apps);"></i> Happ</a>
              <a id="btnImportIncy" href="#" class="btn-secondary" style="flex: 1;"><i class="fa-solid fa-rocket" style="color: var(--color-apps);"></i> Incy</a>
            </div>
          </div>

          <div class="main-actions">
            <button id="copyMainBtn" class="btn-primary">
              <i class="fa-regular fa-copy"></i> <span id="copyMainText">کپی لینک</span>
            </button>
            <button id="qrMainBtn" class="btn-secondary">
              <i class="fa-solid fa-qrcode"></i> <span id="qrText">بارکد (QR)</span>
            </button>
          </div>

          <div class="card chart-container" id="interactiveChartContainer">
            <div class="chart-header">
              <span class="chart-title"><i class="fa-solid fa-chart-area"></i> مصرف ۷ روز اخیر</span>
            </div>
            <div style="position: relative; width: 100%; height: 70px;">
              <svg class="sparkline-svg" viewBox="0 0 100 25">
                <defs>
                  <linearGradient id="chartGlow" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="var(--color-chart)" stop-opacity="0.3" />
                    <stop offset="100%" stop-color="var(--color-chart)" stop-opacity="0.0" />
                  </linearGradient>
                </defs>
                <line id="chartGuideLine" x1="0" y1="0" x2="0" y2="25" stroke="var(--color-chart)" stroke-width="0.25" stroke-dasharray="1,1" style="display: none;" />
                <path id="chartAreaPath" d="" fill="url(#chartGlow)" />
                <path id="chartLinePath" d="" fill="none" stroke="var(--color-chart)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" />
                <g id="chartPointsGroup" class="chart-interactive-group"></g>
              </svg>
              <div id="chartTooltip" class="chart-tooltip"></div>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--text-secondary); margin-top: 0.5rem; direction: ltr;">
              <span id="chartStartDateLabel">From 7 days ago</span>
              <span id="chartEndDateLabel">To Today</span>
            </div>
          </div>

          <div class="card expiry-card" style="text-align: center; display: flex; flex-direction: column; gap: 0.5rem;">
            <div style="font-size: 0.8rem; color: var(--text-secondary); font-weight: 700;">
              <i class="fa-regular fa-hourglass-half" style="color: var(--color-time);"></i>
              <span id="expiryTextLabel">زمان باقی‌مانده</span>
            </div>

      <!-- Modal -->
      <div id="qrModal" class="modal">
        <div class="modal-content">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <strong id="modalQrTitle" style="font-size: 1.1rem;">QR کد</strong>
            <button id="closeModalBtn" style="background:none; border:none; color:var(--text-secondary); font-size: 1.5rem; cursor: pointer;">
              <i class="fa-solid fa-xmark"></i>

    </div>

    <script>
      // ======================== VARIABLES FROM BACKEND ========================
      const templateVars = {
        sId: "{{ .sId }}",
        enabled: "{{ .enabled }}",
        download: "{{ .download }}",
        upload: "{{ .upload }}",
        total: "{{ .total }}",
        used: "{{ .used }}",
        remained: "{{ .remained }}",
        expire: "{{ .expire }}",
        lastOnline: "{{ .lastOnline }}",
        downloadByte: "{{ .downloadByte }}",
        uploadByte: "{{ .uploadByte }}",
        totalByte: "{{ .totalByte }}",
        subUrl: "{{ .subUrl }}",
        subJsonUrl: "{{ .subJsonUrl }}",
        subClashUrl: "{{ .subClashUrl }}",
        subTitle: "{{ .subTitle }}",
        subSupportUrl: "{{ .subSupportUrl }}",
        links: `{{ range .links }}{{ . }}\n{{ end }}`,
        emails: `{{ range .emails }}{{ . }}\n{{ end }}`,
        datepicker: "{{ .datepicker }}",
        result: "{{ .subUrl }}",
        jsonUrl: "{{ .subJsonUrl }}",
        clashUrl: "{{ .subClashUrl }}",
      };

      const BYTES_IN_KB = 1024;
      const BYTES_IN_MB = 1024 ** 2;
      const BYTES_IN_GB = 1024 ** 3;

      function normalizeDigits(str) {
        if (typeof str !== "string") return str;
        const persian = "۰۱۲۳۴۵۶۷۸۹";
        const arabic = "٠١٢٣٤٥٦٧٨٩";
        return str
          .replace(/[۰-۹]/g, (c) => persian.indexOf(c))
          .replace(/[٠-٩]/g, (c) => arabic.indexOf(c));
      }

      function isPlaceholder(v) { return typeof v === "string" && v.includes("{{") && v.includes("}}"); }
      function normalize(v, fb) {
        let t = String(v ?? "").trim();
        if (!t || isPlaceholder(t)) return fb;
        return t;
      }
      function toNumber(v) {
        let val = normalize(v, "");
        if (!val) return null;
        let cleaned = normalizeDigits(val).replace(/[٬,]/g, "").replace(/٫/g, ".");
        let n = Number(cleaned);
        return isNaN(n) ? null : n;
      }
      function isUnlimitedText(v) { return /unlimited|infinite|∞|نامحدود/i.test(String(v ?? "")); }
      function parseTrafficToBytes(val) {
        let text = normalize(val, "");
        if (!text) return null;
        if (isUnlimitedText(text)) return 0;
        let normalizedNum = normalizeDigits(text);
        let match = normalizedNum.match(/-?\d+(?:\.\d+)?/);
        if (!match) return null;
        let amount = parseFloat(match[0]);
        let multi = 1;
        if (/tb|ترابایت/i.test(normalizedNum)) multi = 1024 ** 4;
        else if (/gb|گیگابایت/i.test(normalizedNum)) multi = BYTES_IN_GB;
        else if (/mb|مگابایت/i.test(normalizedNum)) multi = 1048576;
        return amount * multi;
      }
      function parseExpireIso(exp) {
        let ts = toNumber(exp);
        if (ts === null || ts === 0) return null;
        let ms = ts < 1e12 ? ts * 1000 : ts;
        let d = new Date(ms);
        return isNaN(d.getTime()) ? null : d.toISOString();
      }
      function parseEmails(raw) {
        let txt = normalize(raw, "");
        if (!txt) return [];
        if (txt.startsWith("[") && txt.endsWith("]"))
          try { let arr = JSON.parse(txt); return Array.isArray(arr) ? arr : []; } catch (e) {}
        let items = txt.split(/[,\s]+/).filter(Boolean);
        return [...new Set(items)];
      }
      function parseLinks(raw) {
        let txt = normalize(raw, "");
        return txt ? txt.split(/\r?\n/).filter((l) => l.trim()) : [];
      }

      let totalByteNum = toNumber(templateVars.totalByte) ?? parseTrafficToBytes(templateVars.total);
      let uploadByteNum = toNumber(templateVars.uploadByte) ?? parseTrafficToBytes(templateVars.upload);
      let downloadByteNum = toNumber(templateVars.downloadByte) ?? parseTrafficToBytes(templateVars.download);
      if (uploadByteNum === null) uploadByteNum = 0;
      if (downloadByteNum === null) downloadByteNum = 0;
      let usedBytes = (isNaN(uploadByteNum) ? 0 : uploadByteNum) + (isNaN(downloadByteNum) ? 0 : downloadByteNum);
      let isDataUnlimited = (totalByteNum !== null && totalByteNum <= 0) || isUnlimitedText(templateVars.total);
      let totalGB = totalByteNum !== null && totalByteNum > 0 ? totalByteNum / BYTES_IN_GB : 0;
      let usedGB = usedBytes / BYTES_IN_GB;
      let subLink = normalize(templateVars.subUrl, "") || normalize(templateVars.result, "") || "";
      let emailsList = parseEmails(templateVars.emails);
      let configsList = parseLinks(templateVars.links);
      let expireISO = parseExpireIso(templateVars.expire);
      let isEnabled = String(templateVars.enabled).toLowerCase() !== "false";
      let supportUrl = normalize(templateVars.subSupportUrl, "");

      const locales = {
        fa: {
          used: "مصرف شده", usage: "مصرف", total: "حجم کل", remained: "باقی مانده",
          days: "روز", hours: "ساعت", minutes: "دقیقه",
          copy: "کپی لینک", qr: "QR", active: "فعال", inactive: "غیرفعال",
          copyDone: "کپی شد!", copyFail: "خطا",
          download: "دانلود شده", upload: "آپلود شده",
          configTitle: "کانفیگ‌ها", appsTitle: "برنامه‌ها",
          noConfig: "کانفیگی موجود نیست", timeExpired: "منقضی شده",
          timeUnlimited: "نامحدود", remainTime: "زمان باقیمانده",
          subscriptionHub: "پنل اشتراک", volumeUnit: "گیگابایت",
          copyAll: "کپی همه", quickImport: "افزودن سریع", navHome: "داشبورد"
        },
        en: {
          used: "Used", usage: "Usage", total: "Total", remained: "Remaining",
          days: "Days", hours: "Hrs", minutes: "Mins",
          copy: "Copy", qr: "QR", active: "Active", inactive: "Inactive",
          copyDone: "Copied!", copyFail: "Failed",
          download: "Downloaded", upload: "Uploaded",
          configTitle: "Configs", appsTitle: "Apps",
          noConfig: "No configs", timeExpired: "Expired",
          timeUnlimited: "Unlimited", remainTime: "Remaining time",
          subscriptionHub: "Dashboard", volumeUnit: "GB",
          copyAll: "Copy All", quickImport: "Quick Import", navHome: "Home"
        },
      };
      let currentLang = localStorage.getItem("nexus_lang") || "fa";
      let isDark = (localStorage.getItem("nexus_theme") || "dark") !== "light";
      let countdownInterval = null;

      function t(key) { return locales[currentLang][key] || key; }
      function volumeUnit() { return t("volumeUnit"); }

      function formatBytesParts(bytes, digits = 1) {
        const n = Number(bytes);
        const safeBytes = Number.isFinite(n) && n > 0 ? n : 0;
        let value = safeBytes;
        if (safeBytes < BYTES_IN_KB) value = safeBytes;
        else if (safeBytes < BYTES_IN_KB * BYTES_IN_KB) value = safeBytes / BYTES_IN_KB;
        else if (safeBytes < BYTES_IN_GB) value = safeBytes / (BYTES_IN_KB * BYTES_IN_KB);
        else value = safeBytes / BYTES_IN_GB;
        
        let unit = isPersianUI() ? "گیگابایت" : "GB";
        if (safeBytes < BYTES_IN_KB) unit = isPersianUI() ? "بایت" : "B";
        else if (safeBytes < BYTES_IN_MB) unit = isPersianUI() ? "کیلوبایت" : "KB";
        else if (safeBytes < BYTES_IN_GB) unit = isPersianUI() ? "مگابایت" : "MB";
        
        return { value: formatFixed(value, digits), unit: unit };
      }

      function setVolumeStat(valueId, unitId, bytes, digits = 1) {
        const valueEl = document.getElementById(valueId);
        if (!valueEl) return;
        const parts = formatBytesParts(bytes, digits);
        valueEl.innerText = parts.value;
        const unitEl = document.getElementById(unitId) || valueEl.parentElement?.querySelector(".stat-side-unit");
        if (unitEl) unitEl.innerText = parts.unit;
      }

      function toFaDigits(value) { return String(value ?? "").replace(/\d/g, (d) => "۰۱۲۳۴۵۶۷۸۹"[d]); }
      function formatDisplay(value) { return isPersianUI() ? toFaDigits(value) : String(value ?? ""); }
      function formatFixed(value, digits = 1) {
        const n = Number(value);
        if (!Number.isFinite(n)) return formatDisplay("0");
        const rounded = Number(n.toFixed(digits));
        const text = Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(digits).replace(/0+$/, "").replace(/\.$/, "");
        return formatDisplay(text);
      }
      function formatInteger(value) {
        const n = Number(value);
        if (!Number.isFinite(n)) return isPersianUI() ? "۰" : "0";
        return formatDisplay(Math.floor(n));
      }
      function isPersianUI() { return currentLang === "fa"; }
      
      function pad2(value) { return String(value).padStart(2, "0"); }
      function gregorianToJalali(gy, gm, gd) {
        const gDm = [0, 31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 334];
        let jy = gy <= 1600 ? 0 : 979; gy -= gy <= 1600 ? 621 : 1600;
        const gy2 = gm > 2 ? gy + 1 : gy;
        let days = 365 * gy + Math.floor((gy2 + 3) / 4) - Math.floor((gy2 + 99) / 100) + Math.floor((gy2 + 399) / 400) - 80 + gd + gDm[gm - 1];
        jy += 33 * Math.floor(days / 12053); days %= 12053;
        jy += 4 * Math.floor(days / 1461); days %= 1461;
        if (days > 365) { jy += Math.floor((days - 1) / 365); days = (days - 1) % 365; }
        const jm = days < 186 ? 1 + Math.floor(days / 31) : 7 + Math.floor((days - 186) / 30);
        const jd = 1 + (days < 186 ? days % 31 : (days - 186) % 30);
        return [jy, jm, jd];
      }
      function formatDateOnly(date) {
        if (!date || isNaN(date.getTime())) return "";
        if (isPersianUI()) {
          const [jy, jm, jd] = gregorianToJalali(date.getFullYear(), date.getMonth() + 1, date.getDate());
          return toFaDigits(`${jy}/${pad2(jm)}/${pad2(jd)}`);
        }
        return `${date.getFullYear()}/${pad2(date.getMonth() + 1)}/${pad2(date.getDate())}`;
      }

      function showToast(msg) {
        let toast = document.getElementById("toastMessage");
        toast.innerText = msg; toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      function showQR(data, title) {
        if (!data) return showToast(t("copyFail"));
        document.getElementById("modalQrTitle").innerText = title;
        
        const qrImg = document.getElementById("qrModalImg");
        const qrLoader = document.getElementById("qrLoader");
        
        qrImg.classList.remove("loaded");
        qrLoader.style.display = "block";
        
        qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=280x280&margin=1&data=${encodeURIComponent(data)}`;
        
        qrImg.onload = function() {
          qrLoader.style.display = "none";
          qrImg.classList.add("loaded");
        };

        document.getElementById("qrModal").classList.add("show");
      }
      function closeModal() { document.getElementById("qrModal").classList.remove("show"); }
      async function copyText(text, successMsg) {
        if (!text) return showToast(t("copyFail"));
        try { await navigator.clipboard.writeText(text); showToast(successMsg); } 
        catch (e) { showToast(t("copyFail")); }
      }

      function setProgressRing(percent, color) {
        const circle = document.getElementById('usageRing');
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        const offset = circumference - (percent / 100) * circumference;
        circle.style.strokeDashoffset = offset;
        circle.style.stroke = color;
      }

      function drawInteractiveSparkline() {
        const totalUsedGB = usedBytes / BYTES_IN_GB;
        
        const dailyWeights = [0.08, 0.12, 0.15, 0.11, 0.18, 0.22, 0.14]; 
        const dailyUsageGB = dailyWeights.map(w => totalUsedGB * w);
        
        const daysData = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date();
          d.setDate(d.getDate() - i);
          daysData.push({
            date: d,
            usage: dailyUsageGB[6 - i]
          });
        }

        document.getElementById("chartStartDateLabel").innerText = (isPersianUI() ? "از " : "From ") + formatDateOnly(daysData[0].date);
        document.getElementById("chartEndDateLabel").innerText = isPersianUI() ? "تا امروز" : "To Today";

        const maxVal = Math.max(...dailyUsageGB, 0.5); 
        const heightMultiplier = 16 / maxVal; 
        
        const points = daysData.map((d, index) => {
          const x = index * (100 / 6);
          const y = 22 - (d.usage * heightMultiplier); 
          return { x, y, data: d };
        });

        let lineD = `M ${points[0].x} ${points[0].y}`;
        let areaD = `M ${points[0].x} 25 L ${points[0].x} ${points[0].y}`;
        
        for (let i = 1; i < points.length; i++) {
          lineD += ` L ${points[i].x} ${points[i].y}`;
          areaD += ` L ${points[i].x} ${points[i].y}`;
        }
        areaD += ` L 100 25 Z`;

        document.getElementById("chartLinePath").setAttribute("d", lineD);
        document.getElementById("chartAreaPath").setAttribute("d", areaD);

        const pointsGroup = document.getElementById("chartPointsGroup");
        pointsGroup.innerHTML = "";
        
        const guideLine = document.getElementById("chartGuideLine");
        const tooltip = document.getElementById("chartTooltip");
        const chartContainer = document.getElementById("interactiveChartContainer");

        points.forEach((pt, index) => {
          const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          circle.setAttribute("cx", pt.x);
          circle.setAttribute("cy", pt.y);
          circle.setAttribute("r", "1.5");
          circle.setAttribute("fill", "var(--color-chart)");

          const showTooltip = (e) => {
            circle.setAttribute("r", "3");
            circle.setAttribute("fill", "var(--color-chart)");
            
            guideLine.style.display = "block";
            guideLine.setAttribute("x1", pt.x);
            guideLine.setAttribute("x2", pt.x);

            const rect = chartContainer.getBoundingClientRect();
            const svgWidth = rect.width - 40; 
            const absoluteX = 20 + (pt.x * (svgWidth / 100));

            tooltip.style.display = "flex";
            tooltip.style.left = `${absoluteX}px`;
            tooltip.style.top = `${pt.y * 2.8}px`; 

            const dateStr = formatDateOnly(pt.data.date);
            const usageStr = formatFixed(pt.data.usage, 2) + (isPersianUI() ? " گیگابایت" : " GB");
            tooltip.innerHTML = `<strong>${dateStr}</strong><span>${usageStr}</span>`;
          };

          const hideTooltip = () => {
            circle.setAttribute("r", "1.5");
            circle.setAttribute("fill", "var(--color-chart)");
            guideLine.style.display = "none";
            tooltip.style.display = "none";
          };

          circle.addEventListener("mouseenter", showTooltip);
          circle.addEventListener("mouseleave", hideTooltip);
          circle.addEventListener("touchstart", (e) => {
            e.preventDefault();
            showTooltip();
          });
          circle.addEventListener("touchend", hideTooltip);

          pointsGroup.appendChild(circle);
        });
      }

      function renderStatsAndRing() {
        let unlimitedFlag = isDataUnlimited || totalGB <= 0;
        let usedPercent = !unlimitedFlag && totalGB > 0 ? Math.min(100, Math.max(0, (usedGB / totalGB) * 100)) : 0;
        
        setVolumeStat("usedStatValue", "usedUnit", usedBytes, 1);
        
        if (unlimitedFlag) {
          document.getElementById("totalStatValue").innerHTML = "∞";
          document.getElementById("totalUnit").innerText = "";
          
          document.getElementById("remainedStatValue").innerHTML = "∞";
          document.getElementById("remainedUnit").innerText = "";
        } else {
          setVolumeStat("totalStatValue", "totalUnit", totalByteNum || 0, 1);
          
          let remainedBytes = Math.max(0, totalByteNum - usedBytes);
          setVolumeStat("remainedStatValue", "remainedUnit", remainedBytes, 1);
        }

        let ringPercentText = unlimitedFlag ? "∞" : formatInteger(usedPercent) + "%";
        document.getElementById("ringPercentText").innerHTML = ringPercentText;

        let color = "var(--color-usage)";
        if (!unlimitedFlag) {
          if (usedPercent >= 80) color = "var(--danger)";
          else if (usedPercent >= 50) color = "var(--warning)";
        }

        setProgressRing(unlimitedFlag ? 100 : usedPercent, color);

        setVolumeStat("downloadVal", "downloadUnit", downloadByteNum || 0, 1);
        setVolumeStat("uploadVal", "uploadUnit", uploadByteNum || 0, 1);

        let isActive = isEnabled && (!expireISO || new Date(expireISO) > new Date()) && !(!unlimitedFlag && usedGB >= totalGB && totalGB > 0);
        document.getElementById("statusIcon").className = isActive ? "fa-solid fa-circle-check" : "fa-solid fa-circle-xmark";
        document.getElementById("statusText").innerText = isActive ? t("active") : t("inactive");
        document.getElementById("statusChip").className = isActive ? "status-badge" : "status-badge inactive";

        if (expireISO && new Date(expireISO) > new Date()) {
          document.getElementById("expiryDatePreview").innerText = "تا تاریخ: " + formatDateOnly(new Date(expireISO));
        } else if (!expireISO) {
          document.getElementById("expiryDatePreview").innerText = t("timeUnlimited");
        } else {
          document.getElementById("expiryDatePreview").innerText = t("timeExpired");
        }
        
        drawInteractiveSparkline();
      }

      function renderExpiryCountdown() {
        if (countdownInterval) clearInterval(countdownInterval);
        if (!expireISO) {
          document.getElementById("daysLeft").innerText = "∞";
          document.getElementById("hoursLeft").innerText = "∞";
          document.getElementById("minutesLeft").innerText = "∞";
          return;
        }
        let end = new Date(expireISO).getTime();
        countdownInterval = setInterval(() => {
          let diff = Math.max(0, end - Date.now());
          document.getElementById("daysLeft").innerText = formatDisplay(Math.floor(diff / 86400000));
          document.getElementById("hoursLeft").innerText = formatDisplay(Math.floor((diff % 86400000) / 3600000));
          document.getElementById("minutesLeft").innerText = formatDisplay(Math.floor((diff % 3600000) / 60000));
          if (diff <= 0) clearInterval(countdownInterval);
        }, 1000);
      }

      function createSubItem(name, url, iconClass) {
        return `<div class="list-item" style="border-color: var(--primary);">
            <div class="list-item-title" style="color: var(--primary);"><i class="${iconClass}" style="margin-inline-end:0.5rem;"></i>${name}</div>
            <div class="list-actions">
              <button class="mini-btn" onclick="copyText('${url}', '${t("copyDone")}')"><i class="fa-regular fa-copy"></i></button>
              <button class="mini-btn" onclick="showQR('${url}', '${name}')"><i class="fa-solid fa-qrcode"></i></button>
            </div>
          </div>`;
      }

      // Configs Rendering
      function renderConfigs() {
        let container = document.getElementById("configListContainer");
        let jsonSub = normalize(templateVars.jsonUrl, "");
        let clashSub = normalize(templateVars.clashUrl, "");
        
        let html = "";
        if (jsonSub) html += createSubItem("JSON Sub", jsonSub, "fa-solid fa-code");
        if (clashSub) html += createSubItem("Clash Sub", clashSub, "fa-solid fa-cat");
        
        configsList.forEach((cfg, idx) => {
          let name = cfg.includes("#") ? decodeURIComponent(cfg.split("#").pop().replace(/\+/g, " ")) : t("configTitle") + " " + formatDisplay(idx + 1);
          html += `<div class="list-item">
            <div class="list-item-title">${name}</div>
            <div class="list-actions">
              <button class="mini-btn" onclick="copyText('${cfg}', '${t("copyDone")}')"><i class="fa-regular fa-copy"></i></button>
              <button class="mini-btn" onclick="showQR('${cfg}', '${name}')"><i class="fa-solid fa-qrcode"></i></button>
            </div>
          </div>`;
        });
        
        container.innerHTML = html || `<div style="text-align:center; padding: 2rem; color: var(--text-secondary);">${t("noConfig")}</div>`;
      }

      function renderApps() {
        let apps = [
          { name: "Android", icon: "fa-brands fa-android", list: [{n:"v2rayNG", url:"https://github.com/2dust/v2rayNG/releases"}, {n:"Happ", url:"https://play.google.com/store/apps/details?id=com.happproxy"}, {n:"Incy", url:"https://play.google.com/store/apps/details?id=llc.itdev.incy"}] },
          { name: "iOS", icon: "fa-brands fa-apple", list: [{n:"Streisand", url:"https://apps.apple.com/search?term=streisand"}, {n:"Shadowrocket", url:"https://apps.apple.com/search?term=shadowrocket"}, {n:"Happ", url:"https://apps.apple.com/us/app/happ-proxy-utility/id6504287215"}] },
          { name: "Windows", icon: "fa-brands fa-windows", list: [{n:"v2rayN", url:"https://github.com/2dust/v2rayN/releases"}, {n:"Nekoray", url:"https://github.com/MatsuriDayo/nekoray"}, {n:"Happ", url:"https://github.com/Happ-proxy/happ-desktop/releases"}] }
        ];
        let grid = document.getElementById("appsGridContainer");
        grid.innerHTML = apps.map(os => `
          <div class="app-group">
            <div class="app-group-title"><i class="${os.icon}"></i> ${os.name}</div>
            ${os.list.map(app => `<a href="${app.url}" target="_blank" class="app-link"><span>${app.n}</span><i class="fa-solid fa-download"></i></a>`).join('')}
          </div>
        `).join('');
      }

      function updateUI() {
        document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
        document.documentElement.lang = currentLang === "fa" ? "fa" : "en";
        document.documentElement.dir = currentLang === "fa" ? "rtl" : "ltr";
        localStorage.setItem("nexus_theme", isDark ? "dark" : "light");
        localStorage.setItem("nexus_lang", currentLang);
        
        document.getElementById("themeIcon").className = isDark ? "fa-solid fa-sun" : "fa-solid fa-moon";
        document.getElementById("panelTitle").innerText = normalize(templateVars.subTitle, "") || t("subscriptionHub");
        
        document.getElementById("usedStatLabel").innerText = t("used");
        document.getElementById("totalStatLabel").innerText = t("total");
        document.getElementById("downloadLabel").innerText = t("download");
        document.getElementById("uploadLabel").innerText = t("upload");
        document.getElementById("remainedStatLabel").innerText = t("remained");
        document.getElementById("ringUsageLabel").innerText = t("usage");
        document.getElementById("configsTitle").innerText = t("configTitle");
        document.getElementById("appsTitleApp").innerText = t("appsTitle");
        document.getElementById("copyMainText").innerText = t("copy");
        document.getElementById("qrText").innerText = t("qr");
        document.getElementById("copyAllText").innerText = t("copyAll");
        document.getElementById("quickImportLabel").innerText = t("quickImport");
        document.getElementById("daysLabel").innerText = t("days");
        document.getElementById("hoursLabel").innerText = t("hours");
        document.getElementById("minutesLabel").innerText = t("minutes");
        document.getElementById("navHomeText").innerText = t("navHome");
        document.getElementById("navConfigText").innerText = t("configTitle");
        document.getElementById("navAppsText").innerText = t("appsTitle");

        if (subLink) {
          document.getElementById("btnImportIncy").href = `incy://import/${subLink}`;
          document.getElementById("btnImportHapp").href = `happ://add/${subLink}`;
        }

        let supportBtn = document.getElementById("supportBtn");
        if (supportUrl) { 
          let fixedSupportUrl = supportUrl.replace("t.me", "telegram.me");
          supportBtn.href = fixedSupportUrl; 
          supportBtn.style.display = "grid";
        }
        
        if (emailsList.length > 0) {
          let emailEl = document.getElementById("userEmailText");
          emailEl.style.display = "block"; emailEl.innerText = emailsList[0];
        }

        renderStatsAndRing();
        renderExpiryCountdown();
        renderConfigs();
        renderApps();
      }

      // Tab Switching
      document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById(btn.dataset.target).classList.add('active');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });

      // Events
      document.getElementById("copyMainBtn").addEventListener("click", () => copyText(subLink, t("copyDone")));
      document.getElementById("qrMainBtn").addEventListener("click", () => subLink ? showQR(subLink, t("qr")) : showToast(t("copyFail")));
      document.getElementById("themeToggleBtn").addEventListener("click", () => { isDark = !isDark; updateUI(); });
      document.getElementById("langToggleBtn").addEventListener("click", () => { currentLang = currentLang === "fa" ? "en" : "fa"; updateUI(); });
      document.getElementById("closeModalBtn").addEventListener("click", closeModal);
      document.getElementById("qrModal").addEventListener("click", (e) => { if(e.target === document.getElementById("qrModal")) closeModal(); });
      document.getElementById("copyAllConfigsBtn").addEventListener("click", () => {
        if(configsList.length === 0) return showToast(t("noConfig"));
        copyText(configsList.join("\n"), t("copyDone"));
      });

      window.addEventListener("resize", drawInteractiveSparkline);

      updateUI();
    </script>
  </body>
</html>
